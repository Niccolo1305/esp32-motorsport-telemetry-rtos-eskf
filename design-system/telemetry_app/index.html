<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Telemetria · Session Analyser</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.js"></script>

<style>
  html,body { min-height:100vh; background: var(--color-bg-1); }
  body { overflow-x: hidden; }

  /* Top chrome bar */
  .chrome {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px;
    background: rgba(15,16,18,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--color-border-2);
  }
  .chrome .brand { display:flex; align-items:center; gap:10px; }
  .chrome .mark {
    width: 26px; height: 26px;
    border: 1.5px solid var(--color-fg-1);
    border-radius: 4px;
    display:flex; align-items:center; justify-content:center;
    font-family: var(--font-mono); font-weight: 700; font-size: 14px;
    color: var(--color-fg-1); position: relative;
  }
  .chrome .mark::after {
    content:''; position:absolute; right:-2px; bottom:-2px;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--color-signal); box-shadow: 0 0 4px var(--color-signal);
  }
  .chrome .wm { font-family: var(--font-mono); font-weight: 700; font-size: 13px; letter-spacing: -0.01em;}
  .chrome .v  { font-family: var(--font-mono); font-size: 10px; color: var(--color-fg-3); letter-spacing: .08em; text-transform: uppercase; margin-left: 6px;}
  .chrome .nav { display:flex; gap: 2px; }
  .chrome .nav button {
    background: transparent; border: none;
    font-family: var(--font-mono); font-size: 11px;
    color: var(--color-fg-3); letter-spacing: .08em; text-transform: uppercase;
    padding: 6px 12px; cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -11px;
  }
  .chrome .nav button:hover { color: var(--color-fg-1); }
  .chrome .nav button.active { color: var(--color-fg-1); border-bottom-color: var(--color-accent); }
  .chrome .tools { display:flex; align-items:center; gap: 10px; font-family: var(--font-mono); font-size: 11px; color: var(--color-fg-3);}
  .chrome .tools .file { color: var(--color-fg-1); }
  .chrome .tools .sep  { color: var(--color-fg-4); }

  .btn {
    font-family: var(--font-mono); font-size: 11px; font-weight: 500;
    letter-spacing: .06em; text-transform: uppercase;
    padding: 6px 10px; border-radius: 2px;
    border: 1px solid var(--color-border-2);
    background: transparent; color: var(--color-fg-1);
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    transition: all 150ms var(--ease-out);
  }
  .btn:hover { background: var(--color-bg-3); border-color: var(--color-accent); }
  .btn.primary { background: var(--color-signal); color: #000; border-color: var(--color-signal); }
  .btn.primary:hover { filter: brightness(1.05); }
  .btn.ghost { border-color: transparent; color: var(--color-fg-2); }
  .btn.ghost:hover { background: var(--color-bg-2); color: var(--color-fg-1); border-color: transparent;}
  .btn[disabled] { opacity: .4; cursor: not-allowed; }
  .btn .ic { width: 14px; height: 14px; stroke-width: 1.5;}

  /* Light theme override */
  body.light {
    --color-bg-0: #FFFFFF;
    --color-bg-1: #F5F6F7;
    --color-bg-2: #FFFFFF;
    --color-bg-3: #ECEEF0;
    --color-fg-1: #0E0F11;
    --color-fg-2: #4A4E55;
    --color-fg-3: #7A7F87;
    --color-fg-4: #B4B8BE;
    --color-border-1: rgba(0,0,0,0.08);
    --color-border-2: rgba(0,0,0,0.14);
    --color-grid: rgba(0,0,0,0.04);
  }

  /* Landing / drop-zone */
  .landing {
    min-height: calc(100vh - 48px);
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
    background: var(--grid-bg);
  }
  .dropzone {
    width: min(680px, 92vw);
    border: 1.5px dashed var(--color-border-2);
    border-radius: 4px;
    padding: 56px 40px;
    text-align: center;
    background: var(--color-bg-2);
    transition: all 200ms var(--ease-out);
    position: relative;
  }
  .dropzone.drag { border-color: var(--color-signal); box-shadow: 0 0 0 1px var(--color-signal); }
  .dropzone h1 {
    font-family: var(--font-display);
    font-size: 40px; font-weight: 700; letter-spacing: -0.02em;
    margin: 0 0 8px;
  }
  .dropzone .sub {
    font-family: var(--font-mono); font-size: 12px;
    color: var(--color-fg-3); letter-spacing: .08em; text-transform: uppercase;
    margin-bottom: 32px;
  }
  .dropzone .stack { display:flex; flex-direction:column; align-items:center; gap: 16px;}
  .dropzone p { color: var(--color-fg-2); font-size: 14px; max-width: 52ch; margin: 0; }
  .dropzone .specs {
    display:flex; gap: 20px; justify-content:center; margin-top: 24px;
    font-family: var(--font-mono); font-size: 11px; color: var(--color-fg-3);
    letter-spacing: .06em; text-transform: uppercase;
    border-top: 1px solid var(--color-border-1); padding-top: 16px;
  }
  .dropzone .specs b { color: var(--color-fg-1); font-weight: 500; }
  .dropzone input[type=file] { display: none; }
  .sessions {
    width: min(680px, 92vw);
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .session-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: center;
    border: 1px solid var(--color-border-2);
    background: var(--color-bg-2);
    border-radius: 4px;
    padding: 8px 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--color-fg-2);
  }
  .session-row b { color: var(--color-fg-1); font-weight: 500; }
  .session-row .meta { color: var(--color-fg-3); }

  /* Error banner */
  .err {
    margin: 12px auto 0; max-width: 680px;
    padding: 10px 14px; border: 1px solid var(--color-alert);
    color: var(--color-alert); font-family: var(--font-mono); font-size: 12px;
    background: rgba(255,59,48,0.06); border-radius: 2px;
  }

  /* Sample pills */
  .samples { display:flex; gap: 8px; justify-content:center; flex-wrap:wrap; margin-top:24px}
  .sample  {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: .06em;
    padding: 5px 10px; border: 1px solid var(--color-border-2); border-radius: 2px;
    color: var(--color-fg-2); cursor: pointer; background: transparent;
  }
  .sample:hover { border-color: var(--color-accent); color: var(--color-fg-1);}

  /* Loading */
  .loading { display:flex; flex-direction:column; align-items:center; gap: 10px;}
  .loading .bar { width: 240px; height: 2px; background: var(--color-border-2); position: relative; overflow: hidden; border-radius:1px}
  .loading .bar::after {
    content:''; position:absolute; top:0; left:-40%; width:40%; height:100%;
    background: var(--color-signal); animation: sweep 1.2s linear infinite;
  }
  @keyframes sweep { 0%{left:-40%} 100%{left:100%} }
  .loading .msg { font-family: var(--font-mono); font-size: 12px; color: var(--color-fg-2); letter-spacing:.06em; text-transform:uppercase;}

  /* Shell / main panels */
  .shell { padding: 20px; max-width: 1600px; margin: 0 auto; }

  /* Card */
  .card {
    background: var(--color-bg-2);
    border: 1px solid var(--color-border-2);
    border-radius: 4px;
    box-shadow: var(--shadow-1);
    position: relative;
  }
  .card > .head {
    display:flex; justify-content:space-between; align-items:center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--color-border-1);
  }
  .card > .head .t {
    font-family: var(--font-mono); font-size: 11px; font-weight: 500;
    letter-spacing: .08em; text-transform: uppercase;
    color: var(--color-fg-3);
  }
  .card > .head .freq {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: .08em; text-transform: uppercase;
    color: var(--color-signal);
  }
  .card > .body { padding: 14px 16px; }
  .card.flat > .body { padding: 0; }

  /* KPI strip */
  .kpis { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 12px; }
  .kpi {
    background: var(--color-bg-2);
    border: 1px solid var(--color-border-2);
    border-radius: 4px; padding: 12px 14px;
    position: relative;
  }
  .kpi .l {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--color-fg-3); margin-bottom: 6px;
  }
  .kpi .v {
    font-family: var(--font-mono); font-variant-numeric: tabular-nums;
    font-size: 26px; font-weight: 500; line-height: 1;
    color: var(--color-fg-1); letter-spacing: -0.01em;
  }
  .kpi .v .u { font-size: 12px; color: var(--color-fg-3); margin-left: 4px; font-weight: 400; }
  .kpi .sub { font-family: var(--font-mono); font-size: 10px; color: var(--color-fg-3); margin-top: 6px; letter-spacing:.04em;}
  .kpi .dot { display:inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--color-signal); box-shadow: 0 0 4px var(--color-signal); margin-right: 4px; vertical-align: 1px;}

  /* Layouts */
  .row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .row-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .row-map-insights { display:grid; grid-template-columns: 2fr 1fr; gap:12px; margin-bottom: 12px;}
  .stack-v { display: flex; flex-direction: column; gap: 12px;}

  /* Hero map */
  .hero-map { height: 440px; position: relative; background: #000; border-radius: 0 0 4px 4px;}
  #leaflet-map { width: 100%; height: 100%; border-radius: 0 0 4px 4px; }
  .hero-scale {
    position: absolute; bottom: 12px; left: 12px; z-index: 400;
    background: rgba(0,0,0,0.75);
    border: 1px solid var(--color-border-2);
    padding: 8px 10px; border-radius: 2px;
    display: flex; align-items: center; gap: 8px;
    font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--color-fg-2);
  }
  .hero-scale .grad { width: 100px; height: 6px; border-radius: 2px;
    background: linear-gradient(90deg, #00E676 0%, #FFB300 50%, #FF3B30 100%);}
  .hero-overlay {
    position: absolute; top: 12px; right: 12px; z-index: 400;
    display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
  }
  .hero-overlay .chip {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: .06em;
    background: rgba(0,0,0,0.75); border: 1px solid var(--color-border-2);
    color: var(--color-fg-2); padding: 4px 8px; border-radius: 2px;
    text-transform: uppercase;
  }
  .hero-overlay .chip b { color: var(--color-fg-1); font-weight: 500; }

  /* Plot container reset so Plotly dark works */
  .plot { width: 100%; }
  .plot-sm { height: 180px; }
  .plot-md { height: 300px; }
  .plot-lg { height: 440px; }
  .plot-tl { height: 220px; }

  /* Insight cards */
  .insights { display: flex; flex-direction: column; gap: 8px; }
  .insight {
    border: 1px solid var(--color-border-2);
    background: var(--color-bg-2);
    border-radius: 2px;
    padding: 10px 12px;
    display: grid; grid-template-columns: 24px 1fr auto; gap: 10px;
    align-items: center;
  }
  .insight .ic { color: var(--color-fg-3); stroke-width: 1.5; }
  .insight.alert .ic { color: var(--color-alert); }
  .insight.warn .ic  { color: var(--color-warn); }
  .insight.ok .ic    { color: var(--color-signal); }
  .insight.info .ic  { color: var(--color-accent); }
  .insight .txt { min-width: 0; }
  .insight .k {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--color-fg-3); margin-bottom: 2px;
  }
  .insight .v { font-family: var(--font-mono); font-size: 13px; color: var(--color-fg-1); font-variant-numeric: tabular-nums;}
  .insight .m { font-family: var(--font-mono); font-size: 10px; color: var(--color-fg-3); font-variant-numeric: tabular-nums;}

  /* Lap table */
  table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 12px; font-variant-numeric: tabular-nums;}
  th { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--color-fg-3); text-align: right; padding: 8px 10px; border-bottom: 1px solid var(--color-border-2); font-weight: 500;}
  th:first-child, td:first-child { text-align: left; }
  td { padding: 6px 10px; border-bottom: 1px solid var(--color-border-1); color: var(--color-fg-1); text-align: right; }
  tr.best td { color: var(--color-signal); }
  tr.best td:first-child::before { content:'★ '; color: var(--color-signal);}

  /* Controls panel */
  .controls {
    display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
    background: var(--color-bg-2);
    border: 1px solid var(--color-border-2);
    border-radius: 4px;
    padding: 10px 14px;
    margin-bottom: 12px;
  }
  .ctl { display:flex; align-items:center; gap: 8px; }
  .ctl > .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing:.08em; text-transform:uppercase; color: var(--color-fg-3);}
  .seg {
    display:flex; border: 1px solid var(--color-border-2); border-radius: 2px; overflow:hidden;
  }
  .seg button {
    background: transparent; border: none;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase;
    color: var(--color-fg-2); padding: 5px 10px; cursor: pointer;
    border-right: 1px solid var(--color-border-2);
  }
  .seg button:last-child { border-right: none; }
  .seg button.on { background: var(--color-bg-3); color: var(--color-fg-1); }
  .toggle {
    display:inline-flex; align-items:center; gap: 6px;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: .04em; text-transform: uppercase;
    color: var(--color-fg-2); cursor: pointer; user-select:none;
  }
  .toggle .sw {
    width: 26px; height: 14px; background: var(--color-bg-3);
    border: 1px solid var(--color-border-2); border-radius: 8px; position: relative;
    transition: all 150ms var(--ease-out);
  }
  .toggle .sw::after {
    content:''; position:absolute; top: 1px; left: 1px;
    width: 10px; height: 10px; background: var(--color-fg-2); border-radius: 50%;
    transition: all 150ms var(--ease-out);
  }
  .toggle.on .sw { background: var(--color-signal); border-color: var(--color-signal); }
  .toggle.on .sw::after { left: 13px; background: #000; }

  /* Leaflet dark tweaks */
  .leaflet-container { background: #000; }
  .leaflet-control-attribution { background: rgba(0,0,0,0.7) !important; color: var(--color-fg-3) !important; font-family: var(--font-mono); font-size: 9px !important;}
  .leaflet-control-attribution a { color: var(--color-fg-2) !important;}
  .leaflet-control-zoom a { background: var(--color-bg-2) !important; color: var(--color-fg-1) !important; border-color: var(--color-border-2) !important;}

  /* Footer */
  .foot {
    padding: 16px 20px; margin-top: 20px;
    border-top: 1px solid var(--color-border-1);
    font-family: var(--font-mono); font-size: 11px; color: var(--color-fg-3);
    display: flex; justify-content: space-between;
    letter-spacing: .04em;
  }

  @media (max-width: 1280px){
    .kpis { grid-template-columns: repeat(3, 1fr);}
    .row-map-insights { grid-template-columns: 1fr; }
    .row-3 { grid-template-columns: 1fr; }
    .row-4 { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body data-screen-label="telemetria-app">
<div id="root"></div>

<script src="compute.js"></script>
<script src="session_binary.js"></script>
<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="overall.jsx"></script>
<script type="text/babel" src="detail.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
