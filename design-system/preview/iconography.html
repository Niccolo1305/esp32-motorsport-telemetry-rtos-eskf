<!doctype html><html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.js"></script>
<style>
body{padding:20px;background:var(--color-bg-1);display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.i{background:var(--color-bg-2);border:1px solid var(--color-border-2);border-radius:2px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--color-fg-2)}
.i svg{width:20px;height:20px;stroke-width:1.5}
.i span{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--color-fg-3)}
</style></head><body>
<div class="i"><i data-lucide="activity"></i><span>activity</span></div>
<div class="i"><i data-lucide="cpu"></i><span>cpu</span></div>
<div class="i"><i data-lucide="hard-drive"></i><span>hard-drive</span></div>
<div class="i"><i data-lucide="wifi"></i><span>wifi</span></div>
<div class="i"><i data-lucide="wifi-off"></i><span>wifi-off</span></div>
<div class="i"><i data-lucide="satellite"></i><span>satellite</span></div>
<div class="i"><i data-lucide="circle-dot"></i><span>circle-dot</span></div>
<div class="i"><i data-lucide="gauge"></i><span>gauge</span></div>
<div class="i"><i data-lucide="terminal"></i><span>terminal</span></div>
<div class="i"><i data-lucide="download"></i><span>download</span></div>
<div class="i"><i data-lucide="alert-triangle"></i><span>alert</span></div>
<div class="i"><i data-lucide="info"></i><span>info</span></div>
<script>lucide.createIcons();</script>
</body></html>
