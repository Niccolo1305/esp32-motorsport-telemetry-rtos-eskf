<!doctype html><html><head><meta charset="utf-8"><title>Type — Numeric readout</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{padding:20px;background:var(--color-bg-1);display:flex;gap:16px;flex-wrap:wrap}
.ro{background:var(--color-bg-2);border:1px solid var(--color-border-2);border-radius:var(--radius-2);padding:12px 16px;min-width:140px}
.ro .label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-fg-3);margin-bottom:6px}
.ro .v{font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-weight:500;font-size:32px;color:var(--color-fg-1);line-height:1}
.ro .u{font-size:12px;color:var(--color-fg-3);margin-left:4px;font-weight:400}
</style></head><body>
<div class="ro"><div class="label">SOG</div><div class="v">127.4<span class="u">km/h</span></div></div>
<div class="ro"><div class="label">HDOP</div><div class="v">0.82</div></div>
<div class="ro"><div class="label">SATS</div><div class="v">11<span class="u">/14</span></div></div>
<div class="ro"><div class="label">LAP</div><div class="v">03</div></div>
</body></html>
