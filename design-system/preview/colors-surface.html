<!doctype html><html><head><meta charset="utf-8"><title>Colors — Surface</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:16px;background:var(--color-bg-1);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .sw{border:1px solid var(--color-border-2);border-radius:var(--radius-2);padding:10px;height:88px;display:flex;flex-direction:column;justify-content:space-between}
  .sw .name{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-fg-3)}
  .sw .hex{font-size:12px;color:var(--color-fg-2)}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--color-bg-0)"><span class="name">BG-0 · PHOSPHOR</span><span class="hex">#000000</span></div>
  <div class="sw" style="background:var(--color-bg-1)"><span class="name">BG-1 · CARBON</span><span class="hex">#0E0F11</span></div>
  <div class="sw" style="background:var(--color-bg-2)"><span class="name">BG-2 · GRAVEL</span><span class="hex">#1A1C20</span></div>
  <div class="sw" style="background:var(--color-bg-3)"><span class="name">BG-3 · RAISED</span><span class="hex">#24272C</span></div>
</div>
</body></html>
