<!doctype html><html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{padding:16px;background:var(--color-bg-1);}
.row{display:flex;align-items:flex-end;gap:10px}
.col{display:flex;flex-direction:column;align-items:center;gap:6px}
.bar{background:var(--color-accent);width:20px}
.n{font-family:var(--font-mono);font-size:11px;color:var(--color-fg-3);letter-spacing:.06em;text-transform:uppercase}
.v{font-family:var(--font-mono);font-size:11px;color:var(--color-fg-2)}
</style></head><body>
<div class="row">
  <div class="col"><div class="bar" style="height:4px"></div><div class="n">S-1</div><div class="v">4</div></div>
  <div class="col"><div class="bar" style="height:8px"></div><div class="n">S-2</div><div class="v">8</div></div>
  <div class="col"><div class="bar" style="height:12px"></div><div class="n">S-3</div><div class="v">12</div></div>
  <div class="col"><div class="bar" style="height:16px"></div><div class="n">S-4</div><div class="v">16</div></div>
  <div class="col"><div class="bar" style="height:24px"></div><div class="n">S-5</div><div class="v">24</div></div>
  <div class="col"><div class="bar" style="height:32px"></div><div class="n">S-6</div><div class="v">32</div></div>
  <div class="col"><div class="bar" style="height:48px"></div><div class="n">S-7</div><div class="v">48</div></div>
  <div class="col"><div class="bar" style="height:64px"></div><div class="n">S-8</div><div class="v">64</div></div>
  <div class="col"><div class="bar" style="height:80px"></div><div class="n">S-9</div><div class="v">80</div></div>
  <div class="col"><div class="bar" style="height:96px"></div><div class="n">S-10</div><div class="v">96</div></div>
</div>
</body></html>
