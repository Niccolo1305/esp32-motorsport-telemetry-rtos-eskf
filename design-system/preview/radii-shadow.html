<!doctype html><html><head><meta charset="utf-8"><title>Radii & Shadow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{padding:16px;background:var(--color-bg-1);}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.box{width:90px;height:90px;background:var(--color-bg-2);border:1px solid var(--color-border-2);display:flex;align-items:flex-end;justify-content:center;padding:6px;font-family:var(--font-mono);font-size:11px;color:var(--color-fg-3);letter-spacing:.06em;text-transform:uppercase}
.sh{background:var(--color-bg-2);border:1px solid var(--color-border-2);border-radius:2px;padding:18px;font-family:var(--font-mono);font-size:11px;color:var(--color-fg-3);letter-spacing:.06em;text-transform:uppercase}
</style></head><body>
<div class="row">
  <div class="box" style="border-radius:0">R-0 · 0</div>
  <div class="box" style="border-radius:2px">R-1 · 2</div>
  <div class="box" style="border-radius:4px">R-2 · 4</div>
  <div class="box" style="border-radius:12px">R-DEV · 12</div>
  <div class="sh" style="box-shadow:var(--shadow-1)">Shadow-1 · card</div>
  <div class="sh" style="box-shadow:var(--shadow-2)">Shadow-2 · raised</div>
  <div class="sh" style="box-shadow:var(--shadow-phosphor);color:var(--color-signal);border-color:var(--color-signal)">Phosphor glow</div>
</div>
</body></html>
