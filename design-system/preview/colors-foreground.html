<!doctype html><html><head><meta charset="utf-8"><title>Colors — Foreground</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:16px;background:var(--color-bg-1);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .sw{border:1px solid var(--color-border-2);border-radius:var(--radius-2);padding:12px;height:96px;display:flex;flex-direction:column;justify-content:space-between}
  .sw .swatch{width:36px;height:36px;border-radius:2px}
  .sw .name{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-fg-3)}
  .sw .hex{font-size:12px;color:var(--color-fg-2)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="swatch" style="background:var(--color-fg-1)"></div><span class="name">FG-1 · BONE</span><span class="hex">#F5F6F7</span></div>
  <div class="sw"><div class="swatch" style="background:var(--color-fg-2)"></div><span class="name">FG-2 · ALUMINIUM</span><span class="hex">#B4B8BE</span></div>
  <div class="sw"><div class="swatch" style="background:var(--color-fg-3)"></div><span class="name">FG-3 · GRAPHITE</span><span class="hex">#7A7F87</span></div>
  <div class="sw"><div class="swatch" style="background:var(--color-fg-4)"></div><span class="name">FG-4 · DIVIDER</span><span class="hex">#4A4E55</span></div>
</div>
</body></html>
