<!doctype html><html><head><meta charset="utf-8"><title>Telemetry card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{padding:20px;background:var(--color-bg-1);display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.card{background:var(--color-bg-2);border:1px solid var(--color-border-2);border-radius:4px;padding:14px;box-shadow:var(--shadow-1);position:relative;min-height:110px}
.card .cl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-fg-3);margin-bottom:10px}
.card .v{font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-weight:500;font-size:30px;color:var(--color-fg-1);line-height:1}
.card .u{font-size:13px;color:var(--color-fg-3);margin-left:4px;font-weight:400}
.card .sub{font-size:11px;color:var(--color-fg-3);margin-top:8px;letter-spacing:.04em}
.card .dot{display:inline-block;width:6px;height:6px;border-radius:50%;vertical-align:middle;margin-right:6px;background:var(--color-signal);box-shadow:0 0 4px var(--color-signal)}
</style></head><body>
<div class="card">
  <div class="cl">IMU // 50 HZ</div>
  <div class="v">0.32<span class="u">G</span></div>
  <div class="sub"><span class="dot"></span>ax +0.18 · ay +0.27 · az +0.98</div>
</div>
<div class="card">
  <div class="cl">GPS // 10 HZ</div>
  <div class="v">127.4<span class="u">km/h</span></div>
  <div class="sub"><span class="dot"></span>11 sats · HDOP 0.82</div>
</div>
<div class="card">
  <div class="cl">ESKF 5D</div>
  <div class="v">θ 284°</div>
  <div class="sub">x +412.3 m · y −98.6 m</div>
</div>
</body></html>
