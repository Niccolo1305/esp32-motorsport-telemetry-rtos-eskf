<!doctype html><html><head><meta charset="utf-8"><title>Form inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{padding:20px;background:var(--color-bg-1);display:flex;flex-direction:column;gap:10px;max-width:420px}
label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-fg-3);display:block;margin-bottom:4px}
.input{font-family:var(--font-mono);font-size:13px;background:var(--color-bg-0);border:1px solid var(--color-border-2);color:var(--color-fg-1);padding:8px 10px;border-radius:2px;width:100%}
.input:focus{outline:2px solid var(--color-accent);outline-offset:1px;border-color:var(--color-accent)}
.select{appearance:none;background:var(--color-bg-0) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%237A7F87' fill='none' stroke-width='1.5'/></svg>") no-repeat right 12px center}
.row{display:flex;gap:10px}
.row>div{flex:1}
</style></head><body>
<div><label>MQTT BROKER</label><input class="input" value="192.168.1.42"/></div>
<div><label>TOPIC</label><input class="input" value="telemetry/TelUnit_A1B2C3/data"/></div>
<div class="row">
  <div><label>FIRMWARE</label><select class="input select"><option>v1.7.6 (AtomS3R)</option><option>v1.5.2-clean</option></select></div>
  <div><label>BAUD</label><input class="input" value="115200"/></div>
</div>
</body></html>
