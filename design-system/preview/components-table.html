<!doctype html><html><head><meta charset="utf-8"><title>Data table</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{padding:20px;background:var(--color-bg-1)}
table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:12px;font-variant-numeric:tabular-nums}
th{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-fg-3);text-align:right;padding:8px 10px;border-bottom:1px solid var(--color-border-2);font-weight:500}
th:first-child,td:first-child{text-align:left}
td{padding:6px 10px;border-bottom:1px solid var(--color-border-1);color:var(--color-fg-1);text-align:right}
tr:hover td{background:var(--color-bg-2)}
.ok{color:var(--color-signal)}
.warn{color:var(--color-warn)}
</style></head><body>

</body></html>
