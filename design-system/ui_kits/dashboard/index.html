<!doctype html>
<html><head>
<meta charset="utf-8">
<title>Telemetria · Live Dashboard</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.js"></script>
<style>
  body{margin:0;min-height:100vh;background:var(--grid-bg)}
  .app{max-width:1440px;margin:0 auto;padding:20px}
  .bar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--color-bg-2);border:1px solid var(--color-border-2);border-radius:4px;margin-bottom:16px}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .mark{width:28px;height:28px;border:1.5px solid var(--color-fg-1);border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--color-fg-1);font-family:var(--font-mono);font-weight:700;font-size:16px;position:relative}
  .brand .mark::after{content:'';position:absolute;right:-2px;bottom:-2px;width:6px;height:6px;border-radius:50%;background:var(--color-signal);box-shadow:0 0 4px var(--color-signal)}
  .brand .wm{font-family:var(--font-mono);font-weight:700;font-size:15px;letter-spacing:-0.01em}
  .brand .v{font-family:var(--font-mono);font-size:11px;color:var(--color-fg-3);letter-spacing:.08em;text-transform:uppercase}
  .conn{display:flex;gap:10px;align-items:center;font-family:var(--font-mono);font-size:12px;color:var(--color-fg-2)}
  .grid{display:grid;grid-template-columns: 280px 1fr 360px;gap:16px}
  @media (max-width:1100px){.grid{grid-template-columns:1fr}}
  .stack{display:flex;flex-direction:column;gap:12px}
  .panel{background:var(--color-bg-2);border:1px solid var(--color-border-2);border-radius:4px;padding:14px;box-shadow:var(--shadow-1)}
  .panel .cl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-fg-3);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
  .panel .cl .freq{color:var(--color-signal)}
  .bigV{font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-weight:500;color:var(--color-fg-1);line-height:1}
  .u{color:var(--color-fg-3);font-weight:400}
  .row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--color-border-1);font-family:var(--font-mono);font-size:12px}
  .row:last-child{border-bottom:none}
  .row .k{color:var(--color-fg-3);letter-spacing:.04em;text-transform:uppercase;font-size:11px}
  .row .v{color:var(--color-fg-1);font-variant-numeric:tabular-nums}
  .scope{position:relative;height:160px;background:#000;border:1px solid var(--color-border-1);border-radius:2px;overflow:hidden}
  .scope .lbl{position:absolute;top:6px;left:8px;font-size:10px;letter-spacing:.08em;color:var(--color-fg-3);text-transform:uppercase}
  .scope .val{position:absolute;top:6px;right:8px;font-size:11px;color:var(--color-signal);font-family:var(--font-mono);font-variant-numeric:tabular-nums}
  .map{position:relative;height:360px;background:#000;border:1px solid var(--color-border-1);border-radius:2px;overflow:hidden}
  .map .lbl{position:absolute;top:8px;left:10px;font-size:10px;letter-spacing:.08em;color:var(--color-fg-3);text-transform:uppercase;z-index:2}
  .btn{font-family:var(--font-mono);font-size:12px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;padding:7px 12px;border-radius:2px;border:1px solid var(--color-border-2);background:transparent;color:var(--color-fg-1);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{background:var(--color-bg-3);border-color:var(--color-accent)}
  .btn.primary{background:var(--color-accent);color:var(--color-bg-0);border-color:var(--color-accent)}
  .btn.signal{background:var(--color-signal);color:var(--color-bg-0);border-color:var(--color-signal)}
  .badge{font-family:var(--font-mono);font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:3px 6px;border-radius:2px;border:1px solid var(--color-border-2);display:inline-flex;align-items:center;gap:4px;color:var(--color-fg-2)}
  .badge.ok{color:var(--color-signal);border-color:var(--color-signal)}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 4px currentColor}
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--color-border-2);margin-bottom:12px}
  .tab{padding:8px 12px;font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-fg-3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.active{color:var(--color-fg-1);border-bottom-color:var(--color-accent)}
  table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:11px;font-variant-numeric:tabular-nums}
  th{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-fg-3);text-align:right;padding:6px 8px;border-bottom:1px solid var(--color-border-2);font-weight:500}
  th:first-child,td:first-child{text-align:left}
  td{padding:4px 8px;border-bottom:1px solid var(--color-border-1);color:var(--color-fg-2);text-align:right}
  .lap{display:flex;align-items:baseline;gap:8px}
  .lap .num{font-family:var(--font-display);font-weight:700;font-size:56px;line-height:1;color:var(--color-fg-1);letter-spacing:-0.02em}
  .lap .tm{font-family:var(--font-mono);font-size:22px;color:var(--color-signal);font-variant-numeric:tabular-nums}
  .lap .dlt{font-family:var(--font-mono);font-size:13px;color:var(--color-warn)}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-family:var(--font-mono);font-size:12px;font-variant-numeric:tabular-nums}
  .kv .k{color:var(--color-fg-3);font-size:11px;letter-spacing:.04em;text-transform:uppercase}
  .kv .v{color:var(--color-fg-1);text-align:right}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">

const Brand = () => (
  <div className="brand">
    <div className="mark">T</div>
    <div>
      <div className="wm">TELEMETRIA</div>
      <div className="v">Live · v1.7.6</div>
    </div>
  </div>
);

function ScopeTrace({ label, color='#00E676', seed=1 }) {
  const ref = React.useRef();
  React.useEffect(()=>{
    const svg = ref.current; if(!svg) return;
    const W=600, H=160, N=120;
    let y = H/2, out = [];
    const rnd = (i)=>Math.sin(i*0.37+seed)*0.5 + Math.sin(i*0.11+seed*1.7)*0.3;
    for(let i=0;i<N;i++){ y = H/2 + rnd(i)*H*0.35; out.push([i*W/N, y]); }
    svg.querySelector('path').setAttribute('d', 'M '+out.map(p=>p.map(n=>n.toFixed(1)).join(' ')).join(' L '));
  },[seed]);
  return (
    <div className="scope">
      <span className="lbl">{label}</span>
      <span className="val">LIVE · 50 HZ</span>
      <svg ref={ref} viewBox="0 0 600 160" preserveAspectRatio="none" style={{width:'100%',height:'100%'}}>
        <defs>
          <pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth="1"/>
          </pattern>
        </defs>
        <rect width="600" height="160" fill="url(#g)"/>
        <line x1="0" y1="80" x2="600" y2="80" stroke="rgba(255,255,255,0.08)" strokeDasharray="3 3"/>
        <path fill="none" stroke={color} strokeWidth="1.5" style={{filter:`drop-shadow(0 0 3px ${color})`}}/>
      </svg>
    </div>
  );
}

function TrackMap(){
  return (
    <div className="map">
      <span className="lbl">ESKF 5D · FUSED TRAJECTORY · 412.3 m × −98.6 m</span>
      <svg viewBox="0 0 800 360" preserveAspectRatio="xMidYMid meet" style={{width:'100%',height:'100%'}}>
        <defs>
          <pattern id="gg" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="1"/>
          </pattern>
        </defs>
        <rect width="800" height="360" fill="url(#gg)"/>
        {/* track outline */}
        <path d="M 120 280 C 120 120, 260 80, 420 100 S 700 180, 680 260 S 460 340, 300 320 S 120 320, 120 280 Z" fill="none" stroke="#4A4E55" strokeWidth="40" strokeLinejoin="round"/>
        <path d="M 120 280 C 120 120, 260 80, 420 100 S 700 180, 680 260 S 460 340, 300 320 S 120 320, 120 280 Z" fill="none" stroke="#1A1C20" strokeWidth="36" strokeLinejoin="round"/>
        {/* racing line */}
        <path d="M 120 280 C 120 120, 260 80, 420 100 S 700 180, 680 260 S 460 340, 300 320 S 120 320, 120 280 Z" fill="none" stroke="#00E676" strokeWidth="1.5" strokeDasharray="0" opacity="0.6"/>
        {/* car position */}
        <circle cx="530" cy="115" r="5" fill="#00E676" style={{filter:'drop-shadow(0 0 6px #00E676)'}}/>
        <circle cx="530" cy="115" r="10" fill="none" stroke="#00E676" strokeWidth="1" opacity="0.5"/>
        {/* start/finish */}
        <line x1="120" y1="260" x2="120" y2="300" stroke="#FFFFFF" strokeWidth="2" strokeDasharray="4 4"/>
        <text x="100" y="258" fill="#7A7F87" fontSize="10" fontFamily="JetBrains Mono" letterSpacing=".1em">S/F</text>
      </svg>
    </div>
  );
}

function App() {
  const [tab, setTab] = React.useState('live');
  return (
    <div className="app">
      <div className="bar">
        <Brand/>
        <div className="conn">
          <span className="badge ok"><span className="dot"/>MQTT · TelUnit_A1B2C3</span>
          <span className="badge ok"><span className="dot"/>10 HZ</span>
          <button className="btn"><i data-lucide="download" style={{width:14,height:14}}/>tel_83.bin · 42.1 MB</button>
          <button className="btn primary"><i data-lucide="circle-dot" style={{width:14,height:14}}/>Armed</button>
        </div>
      </div>

      <div className="tabs">
        {['Live','Laps','Logs','Config'].map(t=>(
          <div key={t} className={'tab'+(tab===t.toLowerCase()?' active':'')} onClick={()=>setTab(t.toLowerCase())}>{t}</div>
        ))}
      </div>

      <div className="grid">
        {/* Left column — readouts */}
        <div className="stack">
          <div className="panel">
            <div className="cl"><span>SPEED · SOG</span><span className="freq">10 HZ</span></div>
            <div className="bigV" style={{fontSize:48}}>127.4<span className="u" style={{fontSize:14,marginLeft:6}}>km/h</span></div>
          </div>
          <div className="panel">
            <div className="cl"><span>LAP · 03</span><span>BEST −00:00.42</span></div>
            <div className="lap"><div className="num">03</div><div><div className="tm">01:24.812</div><div className="dlt">Δ −0.42</div></div></div>
          </div>
          <div className="panel">
            <div className="cl"><span>GPS // 10 HZ</span><span className="freq">FIX</span></div>
            <div className="kv">
              <span className="k">Sats</span><span className="v">11 / 14</span>
              <span className="k">HDOP</span><span className="v">0.82</span>
              <span className="k">Lat</span><span className="v">45.472103°</span>
              <span className="k">Lon</span><span className="v">9.187421°</span>
              <span className="k">Alt</span><span className="v">132.4 m</span>
              <span className="k">Src</span><span className="v">NMEA SOG</span>
            </div>
          </div>
          <div className="panel">
            <div className="cl"><span>ESKF 5D</span><span>θ + xy</span></div>
            <div className="kv">
              <span className="k">kf_x</span><span className="v">+412.32 m</span>
              <span className="k">kf_y</span><span className="v">−98.61 m</span>
              <span className="k">kf_vel</span><span className="v">35.38 m/s</span>
              <span className="k">kf_heading</span><span className="v">284.1°</span>
            </div>
          </div>
        </div>

        {/* Centre — map + scopes */}
        <div className="stack">
          <div className="panel" style={{padding:0,overflow:'hidden'}}>
            <TrackMap/>
          </div>
          <div className="panel">
            <div className="cl"><span>ACCEL · ax / ay</span><span className="freq">50 HZ · EMA α=0.06</span></div>
            <ScopeTrace label="ax  [g]  ±0.5" color="#00A5FF" seed={1}/>
            <div style={{height:8}}/>
            <ScopeTrace label="ay  [g]  ±0.5" color="#00E676" seed={2}/>
          </div>
          <div className="panel">
            <div className="cl"><span>GYRO · gz (yaw rate)</span><span className="freq">ZARU · STR</span></div>
            <ScopeTrace label="gz  [deg/s]  ±30" color="#FFB300" seed={3}/>
          </div>
        </div>

        {/* Right — diagnostics + raw stream */}
        <div className="stack">
          <div className="panel">
            <div className="cl"><span>SYSTEM · CORE 1</span><span className="freq">OK</span></div>
            <div className="row"><span className="k">Firmware</span><span className="v">v1.7.6-atoms3r</span></div>
            <div className="row"><span className="k">IMU</span><span className="v">BMI270 · 400 kHz</span></div>
            <div className="row"><span className="k">MAG</span><span className="v">BMM150 · 25 Hz</span></div>
            <div className="row"><span className="k">GPS</span><span className="v">AT6668 · 115200</span></div>
            <div className="row"><span className="k">temp_c</span><span className="v">34.8 °C</span></div>
            <div className="row"><span className="k">tbias_gz</span><span className="v">+0.017 °/s</span></div>
            <div className="row"><span className="k">stk_filter</span><span className="v">6 132 B</span></div>
            <div className="row"><span className="k">sd_hwm</span><span className="v">12 / 200</span></div>
            <div className="row"><span className="k">sd_flush_worst</span><span className="v">58 ms</span></div>
            <div className="row"><span className="k">records</span><span className="v">337 198</span></div>
            <div className="row"><span className="k">dropped</span><span className="v" style={{color:'var(--color-signal)'}}>0</span></div>
          </div>
          <div className="panel">
            <div className="cl"><span>RAW MQTT · tail</span><span className="freq">10 HZ</span></div>
            <table>
              <thead><tr><th>t_us</th><th>ax</th><th>ay</th><th>gz</th><th>sog</th></tr></thead>
              <tbody>
                {[
                  ['4 182 204','+0.013','−0.241','+12.04','124.8'],
                  ['4 202 206','+0.018','−0.238','+11.97','125.1'],
                  ['4 222 209','+0.021','−0.244','+12.08','125.3'],
                  ['4 242 210','+0.012','−0.239','+12.03','125.6'],
                  ['4 262 214','+0.017','−0.232','+12.11','125.9'],
                  ['4 282 218','+0.019','−0.229','+12.14','126.2'],
                  ['4 302 222','+0.024','−0.227','+12.18','126.5'],
                ].map((r,i)=>(
                  <tr key={i}>{r.map((c,j)=><td key={j}>{c}</td>)}</tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
setTimeout(()=>window.lucide && lucide.createIcons(), 50);
</script>
</body></html>
