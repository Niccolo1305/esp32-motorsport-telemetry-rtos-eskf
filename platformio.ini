[env:m5stack-atoms3]
platform   = espressif32
board      = m5stack-atoms3
framework  = arduino

; Velocità seriale per il monitor (debug via USB)
monitor_speed = 115200

; Librerie esterne richieste
lib_deps =
    m5stack/M5Unified @ ^0.2.2
    knolleary/PubSubClient @ ^2.8
    mikalhart/TinyGPSPlus @ ^1.0.3
    tomstewart89/BasicLinearAlgebra @ ^3.6

; Tutte le build_flags devono stare sotto un'unica voce:
build_flags =
    -O2
    -DCORE_DEBUG_LEVEL=0
    -DMQTT_MAX_PACKET_SIZE=512
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:m5stack-atoms3r]
platform   = espressif32
board      = m5stack-atoms3
framework  = arduino
monitor_speed = 115200
; AtomS3R has OPI PSRAM — match atoms3r_bench memory config
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
lib_deps =
    m5stack/M5Unified @ ^0.2.2
    knolleary/PubSubClient @ ^2.8
    mikalhart/TinyGPSPlus @ ^1.0.3
    tomstewart89/BasicLinearAlgebra @ ^3.6
build_flags =
    -O2
    -DCORE_DEBUG_LEVEL=0
    -DMQTT_MAX_PACKET_SIZE=512
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DUSE_BMI270
    -DBMM150_USE_FLOATING_POINT

; ── Sensor Bench Test Firmwares ─────────────────────────────────────────────
; Bare-metal characterization: no GPS, no ESKF, no SD, no MQTT.
; Build:  pio run -e atoms3_bench       (or atoms3r_bench)
; Flash:  pio run -e atoms3_bench -t upload
; Log:    pio device monitor | tee results.txt

[env:atoms3_bench]
platform       = espressif32
board          = m5stack-atoms3
framework      = arduino
monitor_speed  = 115200
extra_scripts  = pre:test_fw/set_src.py
custom_src_dir = test_fw/atoms3_bench
lib_deps =
    m5stack/M5Unified @ ^0.2.2
build_flags =
    -O2
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I test_fw/shared

[env:atoms3r_bench]
platform       = espressif32
board          = m5stack-atoms3
framework      = arduino
monitor_speed  = 115200
extra_scripts  = pre:test_fw/set_src.py
custom_src_dir = test_fw/atoms3r_bench
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
lib_deps =
    m5stack/M5Unified @ ^0.2.2
build_flags =
    -O2
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I test_fw/shared

; ── CAN Bus Tool Firmwares ─────────────────────────────────────────────────
; Phase 1 sniffer: LISTEN_ONLY, logs all CAN frames to Serial + SD.
; Phase 3 OBD-II validator: NORMAL mode, sends PID requests.
;
; Build:  pio run -e can_sniffer          (or can_obd2_validator)
; Flash:  pio run -e can_sniffer -t upload
; Log:    pio device monitor | tee can_capture.csv

[env:can_sniffer]
platform       = espressif32
board          = m5stack-atoms3
framework      = arduino
monitor_speed  = 115200
extra_scripts  = pre:test_fw/set_src.py
custom_src_dir = Tool/can_bus/sniffer_fw
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
lib_deps =
    m5stack/M5Unified @ ^0.2.2
build_flags =
    -O2
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:can_obd2_validator]
platform       = espressif32
board          = m5stack-atoms3
framework      = arduino
monitor_speed  = 115200
extra_scripts  = pre:test_fw/set_src.py
custom_src_dir = Tool/can_bus/obd2_validator_fw
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
lib_deps =
    m5stack/M5Unified @ ^0.2.2
build_flags =
    -O2
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
